name: 夸克自动签到保活

on:
  workflow_dispatch:
  schedule:
    # 每天北京时间 09:13 和 18:13 自动触发 (UTC 1:13 和 10:13)
    - cron: '0 1,8 * * *'


jobs:
  sign-in:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # 必须！允许 action 推送 commit

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 获取当前北京日期
        id: get-date
        run: |
          CURRENT_DATE=$(TZ='Asia/Shanghai' date '+%Y-%m-%d')
          echo "date=$CURRENT_DATE" >> "$GITHUB_OUTPUT"

      - name: 随机延迟（防止定时任务过于规律）
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            delay=$((RANDOM % 15))
            echo "手动触发，随机延迟 $delay 秒..."
          else
            delay=$((RANDOM % 60))
            echo "定时 Cron 触发，随机延迟 $delay 秒..."
          fi
          sleep $delay

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 安装依赖
        run: pip install requests

      - name: 执行签到脚本
        env:
          COOKIE_QUARK: ${{ secrets.COOKIE_QUARK }}
        run: python checkIn_Quark.py

      # ─────────────── 自动 commit 当前日期保活 ───────────────
      - name: Create keep-alive commit
        run: |
          echo "# Keep-alive commit" > keepalive.md
          echo "" >> keepalive.md
          echo "Last keep-alive: ${{ steps.get-date.outputs.date }} $(date -u '+%H:%M:%S UTC')" >> keepalive.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add keepalive.md

      - name: Commit & Push if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: keep-alive commit - ${{ steps.get-date.outputs.date }}"
          file_pattern: keepalive.md
          skip_dirty_check: false
          skip_fetch: false
          branch: ${{ github.head_ref || github.ref_name }}
